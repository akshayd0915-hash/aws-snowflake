# ============================================================
# PR Checks Workflow
# Runs on every Pull Request to master branch
# Checks: linting, unit tests, schema validation
# ============================================================

name: PR Checks

on:
  pull_request:
    branches: [ master, main ]
    paths:
      - 'ingestion/**'
      - 'transformation/**'
      - 'orchestration/**'
      - 'data_quality/**'
      - 'tests/**'
      - 'configs/**'

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest pytest-cov pytest-mock

      - name: Run Ruff linter
        run: |
          ruff check ingestion/ transformation/ data_quality/ configs/
        continue-on-error: false

      - name: Check code formatting with Black
        run: |
          black --check ingestion/ transformation/ data_quality/ configs/
        continue-on-error: true

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            .coverage
            htmlcov/

  validate-dag-syntax:
    name: Validate Airflow DAG Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Airflow
        run: |
          pip install apache-airflow==2.8.1 \
            --constraint \
            "https://raw.githubusercontent.com/apache/airflow/constraints-2.8.1/constraints-3.12.txt"
          pip install apache-airflow-providers-snowflake
          pip install apache-airflow-providers-amazon

      - name: Validate DAG files
        run: |
          python -c "
          import ast
          import sys
          from pathlib import Path

          dag_files = list(Path('orchestration/dags').glob('*.py'))
          errors = []

          for dag_file in dag_files:
              try:
                  with open(dag_file) as f:
                      ast.parse(f.read())
                  print(f'OK: {dag_file}')
              except SyntaxError as e:
                  errors.append(f'SYNTAX ERROR in {dag_file}: {e}')
                  print(f'FAILED: {dag_file}: {e}')

          if errors:
              sys.exit(1)
          print(f'All {len(dag_files)} DAG files valid')
          "
        env:
          PYTHONPATH: ${{ github.workspace }}

  validate-sql:
    name: Validate SQL Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check SQL files exist
        run: |
          python -c "
          from pathlib import Path

          sql_files = list(Path('transformation').rglob('*.sql'))
          print(f'Found {len(sql_files)} SQL files:')
          for f in sql_files:
              print(f'  {f}')
              assert f.stat().st_size > 0, f'Empty SQL file: {f}'
          print('All SQL files validated')
          "

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit

      - name: Run security scan
        run: |
          bandit -r ingestion/ transformation/ data_quality/ \
            -ll --skip B101,B601 \
            -f txt
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          python -c "
          import re
          from pathlib import Path

          # Patterns that indicate hardcoded secrets
          secret_patterns = [
              r'password\s*=\s*[\"'][^\"']+[\"']',
              r'secret\s*=\s*[\"'][^\"']+[\"']',
              r'AKIA[0-9A-Z]{16}',
          ]

          py_files = list(Path('.').rglob('*.py'))
          py_files = [f for f in py_files if 'venv' not in str(f)]

          violations = []
          for f in py_files:
              content = f.read_text(encoding='utf-8', errors='ignore')
              for pattern in secret_patterns:
                  if re.search(pattern, content, re.IGNORECASE):
                      violations.append(f'{f}: potential secret found')

          if violations:
              for v in violations:
                  print(f'WARNING: {v}')
          else:
              print('No hardcoded secrets detected')
          "